<!DOCTYPE html>
<html>
<head>
    <title>Changer la couleur du fond</title>
    <style>
        
        h2 {
    margin-bottom: 20px;
    text-align: center;
}

main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 50vh;
    gap: 15px;
}

input, button {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
    width: 250px;   /* même largeur pour input et bouton principal */
    text-align: center;
}

button {
    border: none;
    transition: 0.3s;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

.functionText {
    display: flex;
    flex-direction: column; /* empile verticalement */
    align-items: center;    /* centre horizontalement */
    gap: 10px;
    margin-top: 2rem;
}

.functionText div {
    display: flex;
    gap: 2rem; /* espace entre les deux boutons */
}
p{
    font-size: larger;
    font-weight: bolder;
    font-family: Arial, Helvetica, sans-serif;
    
}

    </style>
</head>
<body>
    <header>
         <h2 id="titre">Changer la couleur de la page</h2>
    </header>
    <main>
        <input type="text" id="couleur" placeholder="Entrez une couleur( red; blue; gold)">

        <button id="btn">Appliquer</button>

        <div class="functionText">
            <p id="texte"></p>
            <div>
                <button onclick="show()" style="background-color: rgba(165, 42, 42, 0.742);">Afficher</button>
                <button onclick="hide()" style="background-color: rgba(165, 42, 42, 0.621);">Cacher</button>
            </div>
            
        </div>
    </main>
    <footer>
    <!-- Espace pour le pied de page  -->
    </footer>

    <script>
        // Sélection des éléments
        const inputCouleur = document.getElementById("couleur");

        const bouton = document.getElementById("btn");

        // Événement clic
        bouton.addEventListener("click", function() {
            let valeur = inputCouleur.value;

            if (valeur === "") {
                alert("Veuillez entrer une couleur !");
                return;
            }

            // Changer la couleur du fond
            document.body.style.backgroundColor = valeur;
        });


         function show(){
            document.getElementById("texte").innerHTML = "Le groupe Simplon_First vous presente leur projet sur le DOM en javascript"; 
        }
        function hide(){
            document.getElementById("texte").innerHTML = " ";
        }

    </script>

</body>
</html>
