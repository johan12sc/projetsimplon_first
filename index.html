<!DOCTYPE html>
<html>
<head>
    <title>Changer la couleur du fond</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <header>
         <h2 id="titre">Changer la couleur de la page</h2>
    </header>
    <main>
        <input type="text" id="couleur" placeholder="Entrez une couleur( red; blue; gold)">

        <button id="btn">Appliquer</button>

        <div class="functionText">
            <p id="texte"></p>
            <div>
                <button onclick="show()" style="background-color: rgba(165, 42, 42, 0.742);">Afficher</button>
                <button onclick="hide()" style="background-color: rgba(165, 42, 42, 0.621);">Cacher</button>
            </div>
        </div>

        <div class="champ">
               <label for="password">Mot de passe</label>
                <input id="password" type="password" placeholder="Entrez votre mot de passe">
          <div>
            <div class="mess">
            <p class="hide msg-error">Le mot de passe doit contenir 8 caractères</p>
            <p class="hide msg-success">Le mot de passe est OK</p>
           </div>

         <button id="cacher-mdp-btn">Afficher</button>
         <button id="check-mdp-btn">Verifier</button>

        </div>
    </main>
    <footer>
    <!-- Espace pour le pied de page  -->
    </footer>
</body>
<script src="script.js"></script>
</html>
